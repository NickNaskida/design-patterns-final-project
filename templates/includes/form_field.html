<div class="form-field{% if field.errors %} form-field--invalid{% endif %}">
    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}
    <p class="field-help">{{ field.help_text|safe }}</p>
    {% endif %}
    {% if field.errors %}
    <ul class="field-errors" id="{{ field.id_for_label }}_errors">
        {% for error in field.errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
    {% endif %}
</div>
