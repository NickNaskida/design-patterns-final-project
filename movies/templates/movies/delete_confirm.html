{% extends "base.html" %}

{% block title %}Delete Movie — Movie Ratings{% endblock %}

{% block content %}
<div class="card card-narrow">
    <h1 class="page-title">Delete movie</h1>
    <p class="page-lead">Are you sure you want to delete <strong>{{ movie.title }}</strong>? This action cannot be undone.</p>

    <form method="post" class="form-stack">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Yes, delete movie</button>
            <a class="back-link" href="{% url 'movie_list' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
