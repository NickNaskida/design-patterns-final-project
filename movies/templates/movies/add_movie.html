<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Add Movie</title>
</head>
<body>
    <h1>Add a New Movie</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Movie</button>
    </form>
    <p><a href="{% url 'movie_list' %}">Back to Movies</a></p>
</body>
</html>
