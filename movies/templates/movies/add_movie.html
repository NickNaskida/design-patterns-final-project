{% extends "base.html" %}

{% block title %}Add Movie — Movie Ratings{% endblock %}

{% block content %}
<div class="card card-narrow">
    <h1 class="page-title">Add a movie</h1>
    <p class="page-lead">Fill in the details below.</p>

    <form method="post" class="form-stack">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save movie</button>
            <a class="back-link" href="{% url 'movie_list' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
