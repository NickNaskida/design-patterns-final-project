{% extends "base.html" %}

{% block title %}Log in — Movie Ratings{% endblock %}

{% block content %}
<div class="card card-narrow">
    <h1 class="page-title">Log in</h1>
    <p class="page-lead">Sign in to add and manage movies.</p>

    <form method="post" class="form-stack">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Log in</button>
        </div>
    </form>

    <p class="form-footer">No account? <a href="{% url 'register' %}">Register</a></p>
</div>
{% endblock %}
